# Reference - operand formats
reference.operandFormat.R=R-format: rd, rs1, rs2
reference.operandFormat.I_ARITH=I-format: rd, rs1, #imm16
reference.operandFormat.LOAD=I-format: rd, offset(rs)
reference.operandFormat.STORE=I-format: offset(rs), rsrc
reference.operandFormat.RD_IMM=I-format: rd, #imm16
reference.operandFormat.RS_LABEL=I-format: rs, label
reference.operandFormat.LABEL=J-format: label
reference.operandFormat.RS=I-format: rs
reference.operandFormat.IMM=I-format: #imm

# Reference - R-format arithmetic
reference.instruction.add.description=Signed addition of two registers.
reference.instruction.add.syntax=add rd, rs1, rs2
reference.instruction.add.operation=rd \u2190 rs1 + rs2
reference.instruction.add.example=add r1, r2, r3  ; r1 = r2 + r3
reference.instruction.addu.description=Unsigned addition (no overflow trap).
reference.instruction.addu.syntax=addu rd, rs1, rs2
reference.instruction.addu.operation=rd \u2190 rs1 + rs2
reference.instruction.addu.example=addu r1, r2, r3
reference.instruction.sub.description=Signed subtraction of two registers.
reference.instruction.sub.syntax=sub rd, rs1, rs2
reference.instruction.sub.operation=rd \u2190 rs1 \u2212 rs2
reference.instruction.sub.example=sub r1, r2, r3  ; r1 = r2 - r3
reference.instruction.subu.description=Unsigned subtraction (no overflow trap).
reference.instruction.subu.syntax=subu rd, rs1, rs2
reference.instruction.subu.operation=rd \u2190 rs1 \u2212 rs2
reference.instruction.subu.example=subu r1, r2, r3

# Reference - I-format arithmetic immediate
reference.instruction.addi.description=Add a sign-extended 16-bit immediate to a register.
reference.instruction.addi.syntax=addi rd, rs1, #imm
reference.instruction.addi.operation=rd \u2190 rs1 + sign_extend(imm16)
reference.instruction.addi.example=addi r1, r2, 100  ; r1 = r2 + 100
reference.instruction.addui.description=Unsigned add immediate (no overflow trap).
reference.instruction.addui.syntax=addui rd, rs1, #imm
reference.instruction.addui.operation=rd \u2190 rs1 + sign_extend(imm16)
reference.instruction.addui.example=addui r1, r2, 100
reference.instruction.subi.description=Subtract a sign-extended 16-bit immediate from a register.
reference.instruction.subi.syntax=subi rd, rs1, #imm
reference.instruction.subi.operation=rd \u2190 rs1 \u2212 sign_extend(imm16)
reference.instruction.subi.example=subi r1, r2, 10  ; r1 = r2 - 10
reference.instruction.subui.description=Unsigned subtract immediate (no overflow trap).
reference.instruction.subui.syntax=subui rd, rs1, #imm
reference.instruction.subui.operation=rd \u2190 rs1 \u2212 sign_extend(imm16)
reference.instruction.subui.example=subui r1, r2, 10

# Reference - R-format logic
reference.instruction.and.description=Bitwise AND of two registers.
reference.instruction.and.syntax=and rd, rs1, rs2
reference.instruction.and.operation=rd \u2190 rs1 & rs2
reference.instruction.and.example=and r1, r2, r3  ; r1 = r2 AND r3
reference.instruction.or.description=Bitwise OR of two registers.
reference.instruction.or.syntax=or rd, rs1, rs2
reference.instruction.or.operation=rd \u2190 rs1 | rs2
reference.instruction.or.example=or r1, r2, r3  ; r1 = r2 OR r3
reference.instruction.xor.description=Bitwise XOR of two registers.
reference.instruction.xor.syntax=xor rd, rs1, rs2
reference.instruction.xor.operation=rd \u2190 rs1 ^ rs2
reference.instruction.xor.example=xor r1, r2, r3  ; r1 = r2 XOR r3

# Reference - I-format logic immediate
reference.instruction.andi.description=Bitwise AND with a sign-extended 16-bit immediate.
reference.instruction.andi.syntax=andi rd, rs1, #imm
reference.instruction.andi.operation=rd \u2190 rs1 & sign_extend(imm16)
reference.instruction.andi.example=andi r1, r2, 0xFF  ; mask lower byte
reference.instruction.ori.description=Bitwise OR with a sign-extended 16-bit immediate.
reference.instruction.ori.syntax=ori rd, rs1, #imm
reference.instruction.ori.operation=rd \u2190 rs1 | sign_extend(imm16)
reference.instruction.ori.example=ori r1, r2, 0x01  ; set lowest bit
reference.instruction.xori.description=Bitwise XOR with a sign-extended 16-bit immediate.
reference.instruction.xori.syntax=xori rd, rs1, #imm
reference.instruction.xori.operation=rd \u2190 rs1 ^ sign_extend(imm16)
reference.instruction.xori.example=xori r1, r2, 0xFF  ; flip lower byte

# Reference - R-format shifts
reference.instruction.sll.description=Shift register left by amount in another register.
reference.instruction.sll.syntax=sll rd, rs1, rs2
reference.instruction.sll.operation=rd \u2190 rs1 << (rs2 & 0x1F)
reference.instruction.sll.example=sll r1, r2, r3  ; r1 = r2 << r3
reference.instruction.srl.description=Shift register right logically (zero-fill) by amount in another register.
reference.instruction.srl.syntax=srl rd, rs1, rs2
reference.instruction.srl.operation=rd \u2190 rs1 >>> (rs2 & 0x1F)
reference.instruction.srl.example=srl r1, r2, r3  ; r1 = r2 >>> r3
reference.instruction.sra.description=Shift register right arithmetically (sign-fill) by amount in another register.
reference.instruction.sra.syntax=sra rd, rs1, rs2
reference.instruction.sra.operation=rd \u2190 rs1 >> (rs2 & 0x1F)
reference.instruction.sra.example=sra r1, r2, r3  ; r1 = r2 >> r3

# Reference - I-format shift immediate
reference.instruction.slli.description=Shift register left by an immediate amount.
reference.instruction.slli.syntax=slli rd, rs1, #imm
reference.instruction.slli.operation=rd \u2190 rs1 << (imm & 0x1F)
reference.instruction.slli.example=slli r1, r2, 2  ; r1 = r2 * 4
reference.instruction.srli.description=Shift register right logically by an immediate amount.
reference.instruction.srli.syntax=srli rd, rs1, #imm
reference.instruction.srli.operation=rd \u2190 rs1 >>> (imm & 0x1F)
reference.instruction.srli.example=srli r1, r2, 2  ; unsigned divide by 4
reference.instruction.srai.description=Shift register right arithmetically by an immediate amount.
reference.instruction.srai.syntax=srai rd, rs1, #imm
reference.instruction.srai.operation=rd \u2190 rs1 >> (imm & 0x1F)
reference.instruction.srai.example=srai r1, r2, 2  ; signed divide by 4

# Reference - R-format comparisons
reference.instruction.slt.description=Set rd to 1 if rs1 < rs2, else 0.
reference.instruction.slt.syntax=slt rd, rs1, rs2
reference.instruction.slt.operation=rd \u2190 (rs1 < rs2) ? 1 : 0
reference.instruction.slt.example=slt r1, r2, r3
reference.instruction.sle.description=Set rd to 1 if rs1 \u2264 rs2, else 0.
reference.instruction.sle.syntax=sle rd, rs1, rs2
reference.instruction.sle.operation=rd \u2190 (rs1 \u2264 rs2) ? 1 : 0
reference.instruction.sle.example=sle r1, r2, r3
reference.instruction.seq.description=Set rd to 1 if rs1 = rs2, else 0.
reference.instruction.seq.syntax=seq rd, rs1, rs2
reference.instruction.seq.operation=rd \u2190 (rs1 = rs2) ? 1 : 0
reference.instruction.seq.example=seq r1, r2, r3
reference.instruction.sgt.description=Set rd to 1 if rs1 > rs2, else 0.
reference.instruction.sgt.syntax=sgt rd, rs1, rs2
reference.instruction.sgt.operation=rd \u2190 (rs1 > rs2) ? 1 : 0
reference.instruction.sgt.example=sgt r1, r2, r3
reference.instruction.sge.description=Set rd to 1 if rs1 \u2265 rs2, else 0.
reference.instruction.sge.syntax=sge rd, rs1, rs2
reference.instruction.sge.operation=rd \u2190 (rs1 \u2265 rs2) ? 1 : 0
reference.instruction.sge.example=sge r1, r2, r3
reference.instruction.sne.description=Set rd to 1 if rs1 \u2260 rs2, else 0.
reference.instruction.sne.syntax=sne rd, rs1, rs2
reference.instruction.sne.operation=rd \u2190 (rs1 \u2260 rs2) ? 1 : 0
reference.instruction.sne.example=sne r1, r2, r3

# Reference - I-format comparison immediate
reference.instruction.slti.description=Set rd to 1 if rs1 < immediate, else 0.
reference.instruction.slti.syntax=slti rd, rs1, #imm
reference.instruction.slti.operation=rd \u2190 (rs1 < sign_extend(imm16)) ? 1 : 0
reference.instruction.slti.example=slti r1, r2, 10
reference.instruction.slei.description=Set rd to 1 if rs1 \u2264 immediate, else 0.
reference.instruction.slei.syntax=slei rd, rs1, #imm
reference.instruction.slei.operation=rd \u2190 (rs1 \u2264 sign_extend(imm16)) ? 1 : 0
reference.instruction.slei.example=slei r1, r2, 10
reference.instruction.seqi.description=Set rd to 1 if rs1 = immediate, else 0.
reference.instruction.seqi.syntax=seqi rd, rs1, #imm
reference.instruction.seqi.operation=rd \u2190 (rs1 = sign_extend(imm16)) ? 1 : 0
reference.instruction.seqi.example=seqi r1, r2, 0  ; test if r2 is zero
reference.instruction.sgti.description=Set rd to 1 if rs1 > immediate, else 0.
reference.instruction.sgti.syntax=sgti rd, rs1, #imm
reference.instruction.sgti.operation=rd \u2190 (rs1 > sign_extend(imm16)) ? 1 : 0
reference.instruction.sgti.example=sgti r1, r2, 10
reference.instruction.sgei.description=Set rd to 1 if rs1 \u2265 immediate, else 0.
reference.instruction.sgei.syntax=sgei rd, rs1, #imm
reference.instruction.sgei.operation=rd \u2190 (rs1 \u2265 sign_extend(imm16)) ? 1 : 0
reference.instruction.sgei.example=sgei r1, r2, 0  ; test if r2 >= 0
reference.instruction.snei.description=Set rd to 1 if rs1 \u2260 immediate, else 0.
reference.instruction.snei.syntax=snei rd, rs1, #imm
reference.instruction.snei.operation=rd \u2190 (rs1 \u2260 sign_extend(imm16)) ? 1 : 0
reference.instruction.snei.example=snei r1, r2, 0  ; test if r2 is nonzero

# Reference - loads
reference.instruction.lb.description=Load a byte from memory, sign-extended to 32 bits.
reference.instruction.lb.syntax=lb rd, offset(rs)
reference.instruction.lb.operation=rd \u2190 sign_extend(mem[rs + offset])
reference.instruction.lb.example=lb r1, 0(r2)
reference.instruction.lh.description=Load a half-word (16 bits) from memory, sign-extended to 32 bits.
reference.instruction.lh.syntax=lh rd, offset(rs)
reference.instruction.lh.operation=rd \u2190 sign_extend(mem[rs + offset])
reference.instruction.lh.example=lh r1, 0(r2)
reference.instruction.lw.description=Load a word (32 bits) from memory.
reference.instruction.lw.syntax=lw rd, offset(rs)
reference.instruction.lw.operation=rd \u2190 mem[rs + offset]
reference.instruction.lw.example=lw r1, 0(r2)  ; r1 = memory[r2]
reference.instruction.lbu.description=Load a byte from memory, zero-extended to 32 bits.
reference.instruction.lbu.syntax=lbu rd, offset(rs)
reference.instruction.lbu.operation=rd \u2190 zero_extend(mem[rs + offset])
reference.instruction.lbu.example=lbu r1, 0(r2)
reference.instruction.lhu.description=Load a half-word from memory, zero-extended to 32 bits.
reference.instruction.lhu.syntax=lhu rd, offset(rs)
reference.instruction.lhu.operation=rd \u2190 zero_extend(mem[rs + offset])
reference.instruction.lhu.example=lhu r1, 0(r2)

# Reference - stores
reference.instruction.sb.description=Store the lowest byte of a register to memory.
reference.instruction.sb.syntax=sb offset(rs), rsrc
reference.instruction.sb.operation=mem[rs + offset] \u2190 rsrc[7:0]
reference.instruction.sb.example=sb 0(r2), r1
reference.instruction.sh.description=Store the lowest half-word of a register to memory.
reference.instruction.sh.syntax=sh offset(rs), rsrc
reference.instruction.sh.operation=mem[rs + offset] \u2190 rsrc[15:0]
reference.instruction.sh.example=sh 0(r2), r1
reference.instruction.sw.description=Store a full word to memory.
reference.instruction.sw.syntax=sw offset(rs), rsrc
reference.instruction.sw.operation=mem[rs + offset] \u2190 rsrc
reference.instruction.sw.example=sw 0(r2), r1  ; memory[r2] = r1

# Reference - load high immediate
reference.instruction.lhi.description=Load a 16-bit immediate into the upper half of a register.
reference.instruction.lhi.syntax=lhi rd, #imm
reference.instruction.lhi.operation=rd \u2190 imm16 << 16
reference.instruction.lhi.example=lhi r1, 0x1234  ; r1 = 0x12340000

# Reference - conditional branches
reference.instruction.beqz.description=Branch to label if register equals zero.
reference.instruction.beqz.syntax=beqz rs, label
reference.instruction.beqz.operation=if rs = 0 then PC \u2190 PC + offset
reference.instruction.beqz.example=beqz r1, done  ; jump if r1 == 0
reference.instruction.bnez.description=Branch to label if register is not zero.
reference.instruction.bnez.syntax=bnez rs, label
reference.instruction.bnez.operation=if rs \u2260 0 then PC \u2190 PC + offset
reference.instruction.bnez.example=bnez r1, loop  ; jump if r1 != 0

# Reference - unconditional jumps
reference.instruction.j.description=Unconditional jump to label.
reference.instruction.j.syntax=j label
reference.instruction.j.operation=PC \u2190 PC + offset
reference.instruction.j.example=j loop  ; jump to loop
reference.instruction.jal.description=Jump to label and save return address in R31.
reference.instruction.jal.syntax=jal label
reference.instruction.jal.operation=R31 \u2190 PC + 4; PC \u2190 PC + offset
reference.instruction.jal.example=jal sub  ; call subroutine

# Reference - jump register
reference.instruction.jr.description=Jump to the address stored in a register.
reference.instruction.jr.syntax=jr rs
reference.instruction.jr.operation=PC \u2190 rs
reference.instruction.jr.example=jr r31  ; return from subroutine
reference.instruction.jalr.description=Jump to register address and save return address in R31.
reference.instruction.jalr.syntax=jalr rs
reference.instruction.jalr.operation=R31 \u2190 PC + 4; PC \u2190 rs
reference.instruction.jalr.example=jalr r2  ; indirect call

# Reference - special
reference.instruction.trap.description=Trap instruction. trap 0 halts the simulator.
reference.instruction.trap.syntax=trap #imm
reference.instruction.trap.operation=Trigger trap handler for the given trap number.
reference.instruction.trap.example=trap 0  ; halt the program

# Reference - directive categories
reference.directive.category.segments=Segments
reference.directive.category.data_declarations=Data Declarations
reference.directive.category.memory_layout=Memory Layout

# Reference - directives
reference.directive.data.description=Switch to the data segment.
reference.directive.data.example=.data
reference.directive.text.description=Switch to the text (code) segment.
reference.directive.text.example=.text
reference.directive.word.description=Declare one or more 32-bit word values.
reference.directive.word.example=.word 42, 100, -1
reference.directive.half.description=Declare one or more 16-bit half-word values.
reference.directive.half.example=.half 0x1234
reference.directive.byte.description=Declare one or more byte values.
reference.directive.byte.example=.byte 0, 255, 0x0A
reference.directive.ascii.description=Declare an ASCII string without null terminator.
reference.directive.ascii.example=.ascii "Hello"
reference.directive.asciiz.description=Declare a null-terminated ASCII string.
reference.directive.asciiz.example=.asciiz "Hello, World!"
reference.directive.space.description=Reserve n bytes of zero-filled space.
reference.directive.space.example=.space 100  ; reserve 100 bytes
reference.directive.align.description=Align the next datum to a 2^n byte boundary.
reference.directive.align.example=.align 2  ; align to 4-byte boundary

# Reference - register conventions
reference.register.r0.purpose=Always zero (hardwired)
reference.register.r0.notes=Any write to R0 is discarded. Reads always return 0.
reference.register.r1.purpose=Reserved for the assembler
reference.register.r1.notes=Used internally by the assembler for pseudo-instructions.
reference.register.r2_r3.purpose=Function return values
reference.register.r2_r3.notes=The called function places its return value in R2 (and R3 for 64-bit values).
reference.register.r4_r7.purpose=Function parameters
reference.register.r4_r7.notes=The first four arguments are passed in R4\u2013R7. Additional arguments go on the stack.
reference.register.r8_r15.purpose=General-purpose temporaries
reference.register.r8_r15.notes=Caller-saved. May be overwritten by called functions.
reference.register.r16_r23.purpose=Callee-saved register variables
reference.register.r16_r23.notes=Callee-saved. A called function must preserve these values.
reference.register.r24_r25.purpose=General-purpose temporaries
reference.register.r24_r25.notes=Caller-saved. May be overwritten by called functions.
reference.register.r26_r27.purpose=Reserved for the operating system
reference.register.r26_r27.notes=Do not use in user programs.
reference.register.r28.purpose=Global pointer (GP)
reference.register.r28.notes=Points to the global data area.
reference.register.r29.purpose=Stack pointer (SP)
reference.register.r29.notes=Points to the top of the stack. Grows downward.
reference.register.r30.purpose=Callee-saved register variable
reference.register.r30.notes=Callee-saved. Often used as a frame pointer.
reference.register.r31.purpose=Return address (RA)
reference.register.r31.notes=Set automatically by JAL and JALR. Use JR R31 to return.

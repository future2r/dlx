reference.instruction.add.description=Vorzeichenbehaftete Addition zweier Register.
reference.instruction.add.example=add r1, r2, r3  ; r1 = r2 + r3
reference.instruction.add.operation=rd ← rs1 + rs2
reference.instruction.add.syntax=add rd, rs1, rs2
reference.instruction.addi.description=Addiert einen vorzeichenerweiterten 16-Bit-Direktwert zu einem Register.
reference.instruction.addi.example=addi r1, r2, 100  ; r1 = r2 + 100
reference.instruction.addi.operation=rd ← rs1 + sign_extend(imm16)
reference.instruction.addi.syntax=addi rd, rs1, #imm
reference.instruction.addu.description=Vorzeichenlose Addition (kein Überlauf-Trap).
reference.instruction.addu.example=addu r1, r2, r3
reference.instruction.addu.operation=rd ← rs1 + rs2
reference.instruction.addu.syntax=addu rd, rs1, rs2
reference.instruction.addui.description=Vorzeichenlose Addition mit Direktwert (kein Überlauf-Trap).
reference.instruction.addui.example=addui r1, r2, 100
reference.instruction.addui.operation=rd ← rs1 + sign_extend(imm16)
reference.instruction.addui.syntax=addui rd, rs1, #imm
reference.instruction.and.description=Bitweises UND zweier Register.
reference.instruction.and.example=and r1, r2, r3  ; r1 = r2 UND r3
reference.instruction.and.operation=rd ← rs1 & rs2
reference.instruction.and.syntax=and rd, rs1, rs2
reference.instruction.andi.description=Bitweises UND mit einem vorzeichenerweiterten 16-Bit-Direktwert.
reference.instruction.andi.example=andi r1, r2, 0xFF  ; unteres Byte maskieren
reference.instruction.andi.operation=rd ← rs1 & sign_extend(imm16)
reference.instruction.andi.syntax=andi rd, rs1, #imm
reference.instruction.beqz.description=Verzweigt zum Label wenn das Register gleich Null ist.
reference.instruction.beqz.example=beqz r1, fertig  ; springe wenn r1 == 0
reference.instruction.beqz.operation=wenn rs = 0 dann PC ← PC + Offset
reference.instruction.beqz.syntax=beqz rs, Label
reference.instruction.bnez.description=Verzweigt zum Label wenn das Register ungleich Null ist.
reference.instruction.bnez.example=bnez r1, schleife  ; springe wenn r1 != 0
reference.instruction.bnez.operation=wenn rs ≠ 0 dann PC ← PC + Offset
reference.instruction.bnez.syntax=bnez rs, Label


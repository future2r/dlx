name: Maven CI

on:
  push:
    branches:
      - development
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        id: jdk25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Export JDK path
        run: |
          echo "JAVA_25_HOME=${{ steps.jdk25.outputs.path }}" >> $GITHUB_ENV

      - name: Configure Maven Toolchains
        run: |
          mkdir -p ~/.m2
          cp .github/maven/toolchains.xml ~/.m2/toolchains.xml

      - name: Build with Maven
        run: mvn --batch-mode clean verify